version: "3.9"

# Development override - hot reload enabled
services:
  db:
    image: postgres:16-alpine
    container_name: pyneon_db_dev
    environment:
      POSTGRES_DB: python_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pyneon_backend_dev
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/python_learning
      SECRET_KEY: dev-secret-key-not-for-production
      DEBUG: "true"
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: pyneon_frontend_dev
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_dev_data:
